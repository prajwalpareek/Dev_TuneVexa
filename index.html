<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>TuneVexa – Spotify Global Top 200 Charts</title>
    <meta name="description" content="TuneVexa tracks the Spotify Global Top 200 songs updated daily. Discover the most-streamed songs worldwide with stream counts, rankings, and cover art." />
    <meta name="keywords" content="spotify top 200, spotify charts, global music charts, most streamed songs, spotify global, top songs today, music rankings" />
    <link rel="canonical" href="https://www.tunevexa.com/" />

    <!-- Open Graph (for social sharing & Google rich results) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tunevexa.com/" />
    <meta property="og:title" content="TuneVexa – Spotify Global Top 200 Charts" />
    <meta property="og:description" content="Track the Spotify Global Top 200 songs updated daily. Stream counts, rankings, and cover art all in one place." />
    <meta property="og:image" content="https://www.tunevexa.com/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TuneVexa – Spotify Global Top 200 Charts" />
    <meta name="twitter:description" content="Track the Spotify Global Top 200 songs updated daily." />
    <meta name="twitter:image" content="https://www.tunevexa.com/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TuneVexa",
      "url": "https://www.tunevexa.com/",
      "description": "Daily Spotify Global Top 200 music charts with stream counts and rankings.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.tunevexa.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
